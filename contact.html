</html><section class="contact-section">
  <div class="container">
    <h2>Get In Touch</h2>
    <!-- action="#" keeps the form on the same page (no backend for this lab) -->
    <section class="contact-section">
  <div class="contact-form">
    <form action="#" method="POST" enctype="multipart/form-data" novalidate>

      <!-- Full Name -->
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="xxxx xxxx xxxx" required>
      </div>

      <!-- Email Address -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="xxxxxx@gmail.com" required>
      </div>

      <!-- Phone Number -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+254 7xxxxxxxx" required>
      </div>

      <!-- Subject -->
      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
          <option value="">Select a subject</option>
          <option value="collaboration">Collaboration</option>
          <option value="employment">Employment Opportunity</option>
          <option value="general">General Enquiry</option>
        </select>
      </div>

      <!-- Message -->
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>
      </div>

      <!-- File Upload -->
      <div class="form-group">
        <label for="fileUpload">Attach a File (optional)</label>
        <input type="file" id="fileUpload" name="fileUpload" accept=".pdf,.doc,.docx,.jpg,.png">
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn">Send Message</button>

    </form>
  </div>
</section>
